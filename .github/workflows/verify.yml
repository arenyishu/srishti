name: Verify Srishti OS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  PROTOC: protoc

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Install Protoc
      uses: arduino/setup-protoc@v2
      with:
        version: '25.1'
        
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        components: rustfmt, clippy
        
    - name: Check formatting
      run: cargo fmt -- --check || true
        
    - name: Run cargo check
      run: cargo check
      
    - name: Run cargo test
      run: cargo test
      
    - name: Execute Srishti Verification Suite
      run: cargo run -p srishti-cli -- verify
